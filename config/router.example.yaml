# Copy to config/router.yaml for local use.
# This config exposes one virtual model, "coding", backed by fixed GLM endpoints.

auth:
  # Optional. If this env var is set, richard-router requires inbound Bearer auth.
  api_key_env: RICHARD_ROUTER_API_KEY

providers:
  nvidia:
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_API_KEY
    timeout_seconds: 45

  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    timeout_seconds: 60
    headers:
      HTTP-Referer: https://github.com/leonbreukelman/richard-router
      X-Title: richard-router

failover:
  # retry_on_status policy (three states):
  # - omit the field entirely → default list + blanket 5xx (e.g. 599 still retryable)
  # - explicit list → ONLY listed statuses are retryable (no blanket 5xx inheritance)
  # - explicit [] → no HTTP statuses are retryable
  # NOTE: listing statuses here means strict-list semantics. Example copies get that
  # behavior; omit the key if you want the historical default+blanket-5xx policy.
  retry_on_status: [408, 409, 429, 500, 502, 503, 504]
  retry_on_timeout: true
  retry_on_connection_error: true
  max_attempts_per_upstream: 1
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    cooldown_seconds: 30
    half_open_max_probes: 1

observability:
  # Keep false for normal Hermes use so the abstraction does not leak upstream names.
  # Set true only for local diagnostics/live smoke verification.
  expose_upstream_header: false
  # Emits server-side route decisions with metadata only; request/response bodies
  # are never logged and metadata is redacted before emission.
  decision_log_enabled: true

# Optional health-check task — probes degraded/down pool members at a regular
# interval so their status updates without waiting for real traffic.
# Enabled by default after explicitly setting enabled: true.
# health_check:
#   enabled: false
#   interval_seconds: 60        # How often to run the probe cycle
#   probe_max_tokens: 1         # Minimal token cost per probe
#   probe_timeout_seconds: 10   # Per-probe timeout (fail fast)
#   probe_statuses: ["degraded", "down"]  # Which statuses trigger a probe

virtual_models:
  coding:
    owned_by: richard-router
    # Per-model context window. The router exposes this in GET /v1/models
    # so Hermes can discover it automatically (discover_models: true).
    # Defaults to 128000 when omitted.
    context_length: 128000
    upstreams:
      # --- Load-balanced pool (priority 1, tier 1) ---
      # Both upstreams share priority 1. Traffic is distributed by weight:
      # NVIDIA gets 70% of requests, OpenRouter gets 30%.
      - name: nvidia-glm-5.2
        provider: nvidia
        model: z-ai/glm-5.2
        priority: 1
        weight: 70

      - name: openrouter-glm-5.2
        provider: openrouter
        model: z-ai/glm-5.2
        priority: 1
        weight: 30

      # --- Fallback tier (priority 2) ---
      # Only tried if all priority-1 upstreams are unhealthy.
      # Weight defaults to 100 when omitted.
      # - name: deepseek-fallback
      #   base_url: https://api.deepseek.com/v1
      #   api_key_env: DEEPSEEK_API_KEY
      #   model: deepseek-chat
      #   priority: 2

      # Legacy inline form remains supported for back-compat:
      # - name: inline-compatible-example
      #   base_url: https://api.example.invalid/v1
      #   api_key_env: EXAMPLE_API_KEY
      #   model: example/model
      #   timeout_seconds: 60
